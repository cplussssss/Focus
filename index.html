<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🍅</text></svg>" />
  <title>🍅 番茄鐘</title>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="app-layout">

    <!-- ══ 左欄：計時器區 ══ -->
    <div class="col-left">

      <header class="app-header">
        <!-- 番茄圖示可點擊觸發同步 -->
        <button type="button" class="logo-btn" id="btnLogo" title="點擊同步紀錄到 Google Sheet">🍅</button>
        <h1>番茄鐘</h1>
        <span class="sync-state" id="syncState"></span>
      </header>

      <div class="mode-badge" id="modeBadge">準備中</div>
      <div class="timer-display" id="timerDisplay">25:00</div>
      <div class="status-text" id="statusText">準備開始</div>

      <div class="progress-bar-bg">
        <div class="progress-bar-fill" id="progressBarFill"></div>
      </div>

      <section class="settings-section">
        <div class="input-group">
          <label for="workMinutes">工作時間（分）</label>
          <input type="number" id="workMinutes" min="1" max="120" value="25" />
        </div>
        <div class="input-group">
          <label for="breakMinutes">休息時間（分）</label>
          <input type="number" id="breakMinutes" min="1" max="60" value="5" />
        </div>
      </section>

      <section class="task-section">
        <div class="input-group">
          <label for="taskName">這輪做什麼事情</label>
          <input type="text" id="taskName" placeholder="例：寫報告第二章" />
        </div>
        <div class="input-group">
          <label for="taskReason">為什麼要做這件事</label>
          <input type="text" id="taskReason" placeholder="例：截止日是明天，需要先完成草稿" />
        </div>
        <div class="input-group">
          <label for="taskNote">備註（可選填）</label>
          <input type="text" id="taskNote" placeholder="例：記得查第三章參考文獻" />
        </div>
      </section>

      <section class="btn-section">
        <button type="button" class="btn btn-primary"   id="btnStart">▶ 開始</button>
        <button type="button" class="btn btn-secondary" id="btnPause"    disabled>⏸ 暫停</button>
        <button type="button" class="btn btn-warning"   id="btnEndRound" disabled>⏹ 結束本輪</button>
        <button type="button" class="btn btn-secondary" id="btnReset">↺ 重設</button>
        <button type="button" class="btn btn-break"     id="btnBreak"   disabled>☕ 開始休息</button>
      </section>

      <p class="sync-result" id="syncResult"></p>

    </div>

    <!-- ══ 右欄：歷史紀錄（獨立滾動框） ══ -->
    <div class="col-right">
      <div class="history-panel">
        <div class="history-header">
          <h2>📋 歷史紀錄</h2>
          <button type="button" class="btn btn-danger-sm" id="btnClearHistory">清除全部</button>
        </div>
        <div class="history-list" id="historyList">
          <p class="empty-hint">尚無紀錄，完成第一輪後會顯示在這裡。</p>
        </div>
      </div>
    </div>

  </div>

  <!-- ══ Modal：中途結束原因 ══ -->
  <div class="modal-overlay" id="modalEndReason" hidden>
    <div class="modal-box">
      <h3>結束本輪</h3>
      <p>計時尚未結束，請填寫中途結束的原因：</p>
      <textarea id="endReasonInput" rows="3" placeholder="例：臨時有事，需要先離開"></textarea>
      <div class="modal-btn-row">
        <button type="button" class="btn btn-primary"   id="btnConfirmEnd">確認結束</button>
        <button type="button" class="btn btn-secondary" id="btnCancelEnd">取消</button>
      </div>
    </div>
  </div>

  <!-- ══ Modal：休息建議 ══ -->
  <div class="modal-overlay" id="modalBreakSuggest" hidden>
    <div class="modal-box break-modal">
      <div class="break-icon">☕</div>
      <h3>工作完成！休息一下吧</h3>
      <p class="break-suggestion" id="breakSuggestion"></p>
      <button type="button" class="btn btn-primary" id="btnModalStartBreak">開始休息計時</button>
    </div>
  </div>

  <!-- ══ Modal：休息結束 ══ -->
  <div class="modal-overlay" id="modalBreakDone" hidden>
    <div class="modal-box break-modal">
      <div class="break-icon">🍅</div>
      <h3>休息結束！</h3>
      <p>準備好了嗎？可以開始下一輪工作了。</p>
      <button type="button" class="btn btn-primary" id="btnModalNextRound">開始下一輪</button>
    </div>
  </div>

  <!-- ══ Modal：Google 登入引導 ══ -->
  <div class="modal-overlay" id="modalLogin" hidden>
    <div class="modal-box">
      <h3>🔑 登入 Google 帳號</h3>
      <p>同步紀錄到 Google Sheet 需要先登入你的 Google 帳號。</p>
      <div class="modal-btn-row modal-btn-col">
        <button type="button" class="btn btn-google" id="btnGoogleLogin">
          <svg width="18" height="18" viewBox="0 0 48 48" style="vertical-align:middle;margin-right:8px;flex-shrink:0">
            <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
            <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
            <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
            <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
          </svg>
          使用 Google 帳號登入
        </button>
        <button type="button" class="btn btn-secondary" id="btnCancelLogin">取消</button>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
