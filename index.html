<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🍅 番茄鐘</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ========== 主容器 ========== -->
  <div class="app-wrapper">

    <!-- ===== 頁首 ===== -->
    <header class="app-header">
      <span class="logo">🍅</span>
      <h1>番茄鐘</h1>
    </header>

    <!-- ===== 主要工作區 ===== -->
    <main class="main-content">

      <!-- ── 模式標籤 ── -->
      <div class="mode-badge" id="modeBadge">工作模式</div>

      <!-- ── 計時顯示區 ── -->
      <div class="timer-display" id="timerDisplay">25:00</div>

      <!-- ── 狀態文字 ── -->
      <div class="status-text" id="statusText">準備開始</div>

      <!-- ── 進度條 ── -->
      <div class="progress-bar-bg">
        <div class="progress-bar-fill" id="progressBarFill"></div>
      </div>

      <!-- ── 設定區（工作時間 / 休息時間） ── -->
      <section class="settings-section">
        <div class="input-group">
          <label for="workMinutes">工作時間（分鐘）</label>
          <input type="number" id="workMinutes" min="1" max="120" value="25" />
        </div>
        <div class="input-group">
          <label for="breakMinutes">休息時間（分鐘）</label>
          <input type="number" id="breakMinutes" min="1" max="60" value="5" />
        </div>
      </section>

      <!-- ── 任務輸入區 ── -->
      <section class="task-section">
        <div class="input-group full-width">
          <label for="taskName">這輪做什麼事情</label>
          <input type="text" id="taskName" placeholder="例：寫報告第二章" />
        </div>
        <div class="input-group full-width">
          <label for="taskReason">為什麼要做這件事</label>
          <input type="text" id="taskReason" placeholder="例：截止日是明天，需要先完成草稿" />
        </div>
        <div class="input-group full-width">
          <label for="taskNote">備註（可選填）</label>
          <input type="text" id="taskNote" placeholder="例：記得查第三章參考文獻" />
        </div>
      </section>

      <!-- ── 按鈕區 ── -->
      <section class="btn-section">
        <button class="btn btn-primary" id="btnStart">▶ 開始</button>
        <button class="btn btn-secondary" id="btnPause" disabled>⏸ 暫停</button>
        <button class="btn btn-warning" id="btnEndRound" disabled>⏹ 結束本輪</button>
        <button class="btn btn-secondary" id="btnReset">↺ 重設計時</button>
        <button class="btn btn-break" id="btnBreak" disabled>☕ 開始休息</button>
      </section>

    </main>

    <!-- ===== 歷史紀錄區 ===== -->
    <section class="history-section">
      <div class="history-header">
        <h2>📋 歷史紀錄</h2>
        <button class="btn btn-danger-sm" id="btnClearHistory">清除全部</button>
      </div>
      <div class="history-list" id="historyList">
        <p class="empty-hint">尚無紀錄，完成第一輪後會顯示在這裡。</p>
      </div>
    </section>

  </div><!-- /.app-wrapper -->

  <!-- ===== Modal：中途結束原因 ===== -->
  <div class="modal-overlay" id="modalEndReason" hidden>
    <div class="modal-box">
      <h3>結束本輪</h3>
      <p>計時尚未結束，請填寫中途結束的原因：</p>
      <textarea id="endReasonInput" rows="3" placeholder="例：臨時有事，需要先離開"></textarea>
      <div class="modal-btn-row">
        <button class="btn btn-primary" id="btnConfirmEnd">確認結束</button>
        <button class="btn btn-secondary" id="btnCancelEnd">取消</button>
      </div>
    </div>
  </div>

  <!-- ===== Modal：休息建議 ===== -->
  <div class="modal-overlay" id="modalBreakSuggest" hidden>
    <div class="modal-box break-modal">
      <div class="break-icon">☕</div>
      <h3>工作完成！休息一下吧</h3>
      <p class="break-suggestion" id="breakSuggestion"></p>
      <button class="btn btn-primary" id="btnModalStartBreak">開始休息計時</button>
    </div>
  </div>

  <!-- ===== Modal：休息結束提示 ===== -->
  <div class="modal-overlay" id="modalBreakDone" hidden>
    <div class="modal-box break-modal">
      <div class="break-icon">🍅</div>
      <h3>休息結束！</h3>
      <p>準備好了嗎？可以開始下一輪工作了。</p>
      <button class="btn btn-primary" id="btnModalNextRound">開始下一輪</button>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
