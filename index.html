<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🍅</text></svg>" />
  <title>番茄</title>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="app-layout">

    <!-- ══ 左欄：計時器 + 輸入區 ══ -->
    <div class="col-left">

      <header class="app-header">
        <button type="button" class="logo-btn" id="btnLogo" title="點擊同步紀錄到 Google Sheet">🍅</button>
        <h1>番茄鐘</h1>
        <span class="sync-state" id="syncState"></span>
      </header>

      <div class="timer-block">
        <div class="mode-badge" id="modeBadge">準備中</div>
        <div class="timer-display" id="timerDisplay">25:00</div>
        <div class="status-text" id="statusText">準備開始</div>
        <div class="progress-bar-bg">
          <div class="progress-bar-fill" id="progressBarFill"></div>
        </div>
      </div>

      <!-- 設定列：工作 / 休息 / 預計輪數 -->
      <section class="settings-section">
        <div class="input-group">
          <label for="workMinutes">工作（分）</label>
          <input type="number" id="workMinutes" min="1" max="120" value="25" />
        </div>
        <div class="input-group">
          <label for="breakMinutes">休息（分）</label>
          <input type="number" id="breakMinutes" min="1" max="60" value="5" />
        </div>
        <div class="input-group">
          <label for="estimatedRounds">預計輪數</label>
          <input type="number" id="estimatedRounds" min="1" max="20" value="1" />
        </div>
      </section>

      <!-- 任務輸入區 -->
      <section class="task-section">

        <!-- 分類 + 專案標籤（同一行） -->
        <div class="task-row-inline">
          <div class="input-group flex1">
            <label for="taskCategory">任務分類</label>
            <select id="taskCategory">
              <option value="讀書">📚 讀書</option>
              <option value="寫作">✍️ 寫作</option>
              <option value="程式">💻 程式</option>
              <option value="行政">📋 行政</option>
              <option value="運動">🏃 運動</option>
              <option value="生活">🏠 生活</option>
              <option value="雜務">🗂 雜務</option>
              <option value="自訂">✏️ 自訂</option>
            </select>
          </div>
          <div class="input-group flex1">
            <label for="taskProject">專案 / 標籤</label>
            <input type="text" id="taskProject" placeholder="英文、Side Project…" list="projectSuggestions" />
            <datalist id="projectSuggestions">
              <option value="英文"><option value="Side Project"><option value="運動">
              <option value="讀書"><option value="其他">
            </datalist>
          </div>
        </div>

        <!-- 任務名稱 -->
        <div class="input-group">
          <label for="taskName">這輪做什麼事情</label>
          <input type="text" id="taskName" placeholder="例：寫報告第二章" />
        </div>

        <!-- 為什麼 + 備註：摺疊以省空間 -->
        <details class="task-extra" id="taskExtraDetails">
          <summary class="task-extra-toggle">為什麼 / 備註 ▾</summary>
          <div class="task-extra-body">
            <div class="input-group">
              <label for="taskReason">為什麼要做這件事</label>
              <input type="text" id="taskReason" placeholder="例：截止日是明天，需要先完成草稿" />
            </div>
            <div class="input-group">
              <label for="taskNote">備註（可選填）</label>
              <input type="text" id="taskNote" placeholder="例：記得查第三章參考文獻" />
            </div>
          </div>
        </details>

      </section>

      <!-- 控制按鈕 -->
      <section class="btn-section">
        <button type="button" class="btn btn-primary"   id="btnStart">▶ 開始</button>
        <button type="button" class="btn btn-secondary" id="btnPause"    disabled>⏸ 暫停</button>
        <button type="button" class="btn btn-warning"   id="btnEndRound" disabled>⏹ 結束本輪</button>
        <button type="button" class="btn btn-secondary" id="btnReset">↺ 重設</button>
        <button type="button" class="btn btn-break"     id="btnBreak"   disabled>☕ 開始休息</button>
      </section>

      <p class="sync-result" id="syncResult"></p>

    </div><!-- /.col-left -->

    <!-- ══ 右欄：摘要 + 歷史紀錄 ══ -->
    <div class="col-right">

      <!-- 今日摘要（固定，不滾動） -->
      <div class="summary-card">
        <div class="summary-top">
          <span class="summary-title">今日摘要</span>
          <span class="summary-date" id="summaryDate"></span>
        </div>
        <div class="summary-stats">
          <div class="summary-stat">
            <span class="summary-num" id="sumRounds">0</span>
            <span class="summary-label">完成輪數</span>
          </div>
          <div class="summary-stat">
            <span class="summary-num" id="sumMinutes">0</span>
            <span class="summary-label">專注分鐘</span>
          </div>
          <div class="summary-stat">
            <span class="summary-num" id="sumRate">—</span>
            <span class="summary-label">完成率</span>
          </div>
          <div class="summary-stat">
            <span class="summary-num" id="sumInterrupts">0</span>
            <span class="summary-label">中斷次數</span>
          </div>
        </div>
        <div class="summary-footer">
          <span id="sumTopCategory">最常分類：—</span>
          <span id="sumRoundProgress" class="summary-round-prog"></span>
        </div>
      </div>

      <!-- 歷史紀錄面板（獨立滾動） -->
      <div class="history-panel">
        <div class="history-header">
          <h2>📋 歷史紀錄</h2>
          <button type="button" class="btn btn-danger-sm" id="btnClearHistory">清除全部</button>
        </div>
        <div class="history-list" id="historyList">
          <p class="empty-hint">尚無紀錄，完成第一輪後會顯示在這裡。</p>
        </div>
      </div>

    </div><!-- /.col-right -->

  </div><!-- /.app-layout -->

  <!-- ══ Modal：中途結束原因 + 評分 ══ -->
  <div class="modal-overlay" id="modalEndReason" hidden>
    <div class="modal-box">
      <h3>⏹ 結束本輪</h3>
      <p>計時尚未結束，請簡短填寫原因：</p>
      <textarea id="endReasonInput" rows="2" placeholder="例：臨時有事，需要先離開"></textarea>

      <div class="field-label">任務結果</div>
      <div class="chip-group" id="resultChips">
        <button type="button" class="chip" data-value="done">✅ 完成</button>
        <button type="button" class="chip" data-value="partial">🔶 部分完成</button>
        <button type="button" class="chip active" data-value="incomplete">❌ 未完成</button>
      </div>

      <div class="field-label">本輪專注度</div>
      <div class="star-row">
        <div class="star-group" id="focusStars">
          <button type="button" class="star-btn" data-val="1">1</button>
          <button type="button" class="star-btn" data-val="2">2</button>
          <button type="button" class="star-btn" data-val="3">3</button>
          <button type="button" class="star-btn" data-val="4">4</button>
          <button type="button" class="star-btn active" data-val="5">5</button>
        </div>
        <span class="star-hint" id="focusHint">5 — 很專注</span>
      </div>

      <div class="field-label">干擾來源（可多選）</div>
      <div class="chip-group wrap" id="distractionChips">
        <button type="button" class="chip sm" data-value="手機">📱 手機</button>
        <button type="button" class="chip sm" data-value="訊息通知">🔔 通知</button>
        <button type="button" class="chip sm" data-value="臨時插單">📌 插單</button>
        <button type="button" class="chip sm" data-value="環境吵">🔊 環境吵</button>
        <button type="button" class="chip sm" data-value="疲勞">😴 疲勞</button>
        <button type="button" class="chip sm" data-value="想滑手機">📲 想滑手機</button>
        <button type="button" class="chip sm" data-value="任務太難">🤯 任務太難</button>
        <button type="button" class="chip sm" data-value="其他">💬 其他</button>
      </div>
      <input type="text" id="distractionOther" class="distraction-other" placeholder="請描述其他干擾…" hidden />

      <div class="modal-btn-row" style="margin-top:14px">
        <button type="button" class="btn btn-primary"   id="btnConfirmEnd">確認結束</button>
        <button type="button" class="btn btn-secondary" id="btnCancelEnd">取消</button>
      </div>
    </div>
  </div>

  <!-- ══ Modal：工作完成（休息建議 + 評分） ══ -->
  <div class="modal-overlay" id="modalBreakSuggest" hidden>
    <div class="modal-box">
      <div class="break-icon">☕</div>
      <h3>工作完成！休息一下吧</h3>
      <p class="break-suggestion" id="breakSuggestion"></p>

      <div class="field-label">任務結果</div>
      <div class="chip-group" id="doneResultChips">
        <button type="button" class="chip active" data-value="done">✅ 完成</button>
        <button type="button" class="chip" data-value="partial">🔶 部分完成</button>
        <button type="button" class="chip" data-value="incomplete">❌ 未完成</button>
      </div>

      <div class="field-label">本輪專注度</div>
      <div class="star-row">
        <div class="star-group" id="doneStars">
          <button type="button" class="star-btn" data-val="1">1</button>
          <button type="button" class="star-btn" data-val="2">2</button>
          <button type="button" class="star-btn" data-val="3">3</button>
          <button type="button" class="star-btn" data-val="4">4</button>
          <button type="button" class="star-btn active" data-val="5">5</button>
        </div>
        <span class="star-hint" id="doneHint">5 — 很專注</span>
      </div>

      <div class="field-label">干擾來源（可多選）</div>
      <div class="chip-group wrap" id="doneDistractionChips">
        <button type="button" class="chip sm" data-value="手機">📱 手機</button>
        <button type="button" class="chip sm" data-value="訊息通知">🔔 通知</button>
        <button type="button" class="chip sm" data-value="臨時插單">📌 插單</button>
        <button type="button" class="chip sm" data-value="環境吵">🔊 環境吵</button>
        <button type="button" class="chip sm" data-value="疲勞">😴 疲勞</button>
        <button type="button" class="chip sm" data-value="想滑手機">📲 想滑手機</button>
        <button type="button" class="chip sm" data-value="任務太難">🤯 任務太難</button>
        <button type="button" class="chip sm" data-value="其他">💬 其他</button>
      </div>
      <input type="text" id="doneDistractionOther" class="distraction-other" placeholder="請描述其他干擾…" hidden />

      <button type="button" class="btn btn-primary" id="btnModalStartBreak" style="margin-top:16px;width:100%">開始休息計時</button>
    </div>
  </div>

  <!-- ══ Modal：休息結束 ══ -->
  <div class="modal-overlay" id="modalBreakDone" hidden>
    <div class="modal-box break-modal">
      <div class="break-icon">🍅</div>
      <h3>休息結束！</h3>
      <p>準備好了嗎？可以開始下一輪工作了。</p>
      <button type="button" class="btn btn-primary" id="btnModalNextRound" style="width:100%">開始下一輪</button>
    </div>
  </div>

  <!-- ══ Modal：Google 登入 ══ -->
  <div class="modal-overlay" id="modalLogin" hidden>
    <div class="modal-box">
      <h3>🔑 登入 Google 帳號</h3>
      <p>同步紀錄到 Google Sheet 需要先登入你的 Google 帳號。</p>
      <div class="modal-btn-row modal-btn-col">
        <button type="button" class="btn btn-google" id="btnGoogleLogin">
          <svg width="18" height="18" viewBox="0 0 48 48" style="vertical-align:middle;margin-right:8px;flex-shrink:0">
            <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
            <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
            <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
            <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
          </svg>
          使用 Google 帳號登入
        </button>
        <button type="button" class="btn btn-secondary" id="btnCancelLogin">取消</button>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
